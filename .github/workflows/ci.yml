name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create environment
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install -e ".[dev,git]"

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Test (pytest)
        run: uv run pytest -q

      - name: Smoke test the offline demo
        run: |
          uv run catalog demo
          uv run catalog validate --catalog-dir demo_catalog
